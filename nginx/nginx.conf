# WAF RATE LIMITS & CONNECTIONS
# Define rate limiting zone (10 requests per second per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# Define connection limits (Max 50 simultaneous connections per IP)
limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

server {
    listen 80;
    server_name localhost;

    # WAF CONNECTION LIMITS
    limit_conn addr_limit 50;

    # WAF TIMEOUTS (Basic DDoS Protection)
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # WAF SECURITY HEADERS
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # WAF CONTENT SECURITY POLICY (CSP)
    # Carefully crafted to allow frontend CDNs (Tailwind, Fonts, ChartJS, Lucide) while blocking untrusted scripts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # WAF PAYLOAD BUFFER LIMITS
    client_max_body_size 1m;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 8k;

    # WAF MALICIOUS REQUEST BLOCKING
    # Prevent directory traversal and block access to sensitive dotfiles
    if ($request_uri ~* "(%2e%2e/|\.\./|\.env|\.git|\.htaccess|\.config)") {
        return 403;
    }

    # WAF OBVIOUS SCANNER BLOCKING
    # Basic deterrent for automated penetration testing tools. Does not block curl/wget/java/python.
    if ($http_user_agent ~* (nikto|sqlmap|nmap|dirb|w3af|zap|burp)) {
        return 403;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # WAF API RATE LIMITING
        limit_req zone=api_limit burst=20 nodelay;

        # WAF HTTP METHOD RESTRICTIONS
        limit_except GET POST DELETE OPTIONS {
            deny all;
        }

        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
