services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # Exposed to the host only so you can psql/DBeaver in during dev.
      # Not needed in prod (Railway uses its own managed Postgres, not this container).
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - siege-net

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        # Wait until Postgres is actually accepting connections, not just
        # "container started" - otherwise the backend can crash-loop on boot
        # trying to connect before the DB is ready.
        condition: service_healthy
    networks:
      - siege-net
    # Deliberately no "ports:" here. The backend is only reachable through
    # nginx, never directly from the host or internet - smaller attack surface.

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - siege-net

volumes:
  pgdata:

networks:
  # All three services share this network, which is what lets them reach
  # each other by service name (e.g. backend talks to "db", nginx talks to
  # "backend") instead of needing hardcoded IPs.
  siege-net:
    driver: bridge
